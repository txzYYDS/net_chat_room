<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>net_chat — 聊天室</title>
<style>
  /* ========== 全局重置 ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
                 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #0d0d2b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* 背景动画粒子 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(72,52,212,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255,0,128,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ========== 登录面板 ========== */
  #login-panel {
    position: relative; z-index: 1;
    background: rgba(22,22,46,0.85);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 48px 40px;
    width: 420px;
    text-align: center;
    box-shadow: 0 32px 64px rgba(0,0,0,0.4);
  }
  #login-panel h1 {
    color: #e0e0ff;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  #login-panel .subtitle {
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    margin-bottom: 36px;
  }
  #login-panel input {
    width: 100%;
    padding: 14px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #e0e0ff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #login-panel input:focus {
    border-color: rgba(100,120,255,0.5);
    box-shadow: 0 0 0 3px rgba(100,120,255,0.1);
  }
  #login-panel input::placeholder { color: rgba(255,255,255,0.25); }

  /* 密码框 */
  .psk-wrap { position: relative; margin-top: 12px; }
  .psk-wrap input {
    width: 100%;
    padding: 14px 48px 14px 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #e0e0ff;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .psk-wrap input:focus {
    border-color: rgba(100,120,255,0.5);
    box-shadow: 0 0 0 3px rgba(100,120,255,0.1);
  }
  .psk-wrap input::placeholder { color: rgba(255,255,255,0.25); }
  .psk-toggle {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,0.3);
    cursor: pointer; font-size: 18px; width: auto; margin: 0; padding: 4px 8px;
    box-shadow: none;
  }
  .psk-toggle:hover { color: rgba(255,255,255,0.6); box-shadow: none; transform: translateY(-50%); }

  /* 登录/注册切换 */
  .mode-switch {
    display: flex; margin: 16px 0 4px;
    background: rgba(255,255,255,0.04); border-radius: 10px; overflow: hidden;
  }
  .mode-switch span {
    flex: 1; padding: 10px 0; font-size: 14px;
    color: rgba(255,255,255,0.35); cursor: pointer;
    transition: all 0.3s; text-align: center;
  }
  .mode-switch span.active {
    background: linear-gradient(135deg, rgba(99,102,241,0.6), rgba(139,92,246,0.5));
    color: #fff; font-weight: 600;
  }

  #login-panel button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.3s;
  }
  #login-panel button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(99,102,241,0.35);
  }
  #login-panel button:active { transform: scale(0.97); }

  /* ========== 聊天主容器 ========== */
  #chat-container {
    display: none;
    position: relative; z-index: 1;
    width: 820px;
    max-width: 100%;
    height: 92vh;
    max-height: 760px;
    background: rgba(22,22,46,0.82);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    overflow: hidden;
    flex-direction: column;
  }
  #chat-container.active { display: flex; }

  /* ========== 顶部栏 ========== */
  #top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.02);
  }
  #top-bar .room-name { color: #e0e0ff; font-size: 18px; font-weight: 600; letter-spacing: 1px; }
  #top-bar .status {
    display: flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.45); font-size: 13px;
  }
  #top-bar .status .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ========== 消息列表 ========== */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex; flex-direction: column; gap: 6px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
  }

  /* 消息气泡 */
  .msg {
    display: flex; flex-direction: column;
    max-width: 72%;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.self  { align-self: flex-end; }
  .msg.other { align-self: flex-start; }

  .msg .sender {
    font-size: 12px; color: rgba(255,255,255,0.35);
    margin-bottom: 3px; padding: 0 12px;
  }
  .msg.self .sender { text-align: right; }

  .msg .bubble {
    padding: 10px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.55;
    word-break: break-word;
    color: #e8e8f0;
  }
  .msg.self .bubble {
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
  }
  .msg.other .bubble {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border-bottom-left-radius: 4px;
    box-shadow: 0 4px 16px rgba(139,92,246,0.25);
  }

  /* 系统消息 */
  .sys-msg {
    align-self: center;
    padding: 6px 18px;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    animation: fadeUp 0.3s ease;
  }
  .sys-msg.join { color: rgba(34,197,94,0.6); }
  .sys-msg.leave { color: rgba(239,68,68,0.55); }

  /* ========== 底部输入区 ========== */
  #input-area {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px;
    border-top: 1px solid rgba(139,92,246,0.15);
    background: rgba(99,102,241,0.04);
  }
  #input-area input {
    flex: 1;
    padding: 12px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    color: #e0e0ff;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #input-area input:focus {
    border-color: rgba(100,120,255,0.45);
    box-shadow: 0 0 0 3px rgba(100,120,255,0.08);
  }
  #input-area input::placeholder { color: rgba(255,255,255,0.25); }
  #input-area button {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; border-radius: 14px;
    color: #fff; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  #input-area button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 28px rgba(139,92,246,0.4);
  }
  #input-area button:active { transform: scale(0.94); }
  #input-area button svg { width: 22px; height: 22px; fill: #fff; }

  /* 表情按钮 */
  #emoji-btn {
    background: rgba(255,255,255,0.05) !important;
    font-size: 22px;
    line-height: 1;
  }
  #emoji-btn:hover {
    background: rgba(255,255,255,0.1) !important;
  }

  /* ========== 表情选择器 ========== */
  #emoji-picker {
    display: none;
    position: absolute;
    bottom: 80px;
    left: 24px;
    width: 360px;
    max-width: calc(100% - 48px);
    background: rgba(22,22,50,0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    z-index: 10;
    overflow: hidden;
    animation: emojiSlideUp 0.25s ease;
  }
  #emoji-picker.show { display: block; }
  @keyframes emojiSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 分类标签 */
  .emoji-cats {
    display: flex;
    overflow-x: auto;
    padding: 10px 8px 6px;
    gap: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    scrollbar-width: none;
  }
  .emoji-cats::-webkit-scrollbar { display: none; }
  .emoji-cat {
    flex-shrink: 0;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.5);
  }
  .emoji-cat:hover { background: rgba(255,255,255,0.08); }
  .emoji-cat.active {
    background: rgba(99,102,241,0.3);
    color: #fff;
  }

  /* 表情网格 */
  .emoji-grid-wrap {
    height: 220px;
    overflow-y: auto;
    padding: 4px 6px;
  }
  .emoji-grid-wrap::-webkit-scrollbar { width: 4px; }
  .emoji-grid-wrap::-webkit-scrollbar-track { background: transparent; }
  .emoji-grid-wrap::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
  }
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
  }
  .emoji-item {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    user-select: none;
    border: none;
    background: transparent;
    padding: 0;
    line-height: 1;
  }
  .emoji-item:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.3);
  }
  .emoji-item:active { transform: scale(0.9); }

  /* 表情包分类标题 */
  .emoji-section-title {
    grid-column: 1 / -1;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    padding: 8px 6px 4px;
    text-align: left;
  }

  /* 纯表情消息 - 放大无气泡 */
  .msg.emoji-only .bubble {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    font-size: 42px;
    line-height: 1.2;
    padding: 4px 0;
    letter-spacing: 4px;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 600px) {
    #login-panel { width: 100%; padding: 32px 24px; }
    #chat-container { height: 100vh; max-height: 100vh; border-radius: 0; }
    .msg { max-width: 88%; }
    #input-area { padding: 12px 16px; }
    #emoji-picker {
      left: 8px;
      width: calc(100% - 16px);
      bottom: 72px;
    }
    .emoji-grid { grid-template-columns: repeat(7, 1fr); }
    .msg.emoji-only .bubble { font-size: 32px; }
  }
</style>
</head>
<body>

<!-- 登录面板 -->
<div id="login-panel">
  <h1>net_chat</h1>
  <p class="subtitle">基于 C 语言 TCP + select 的聊天室</p>

  <!-- 登录 / 注册切换 -->
  <div class="mode-switch">
    <span id="mode-login" class="active" onclick="switchMode('login')">登录</span>
    <span id="mode-register" onclick="switchMode('register')">注册</span>
  </div>

  <input id="name-input" type="text" placeholder="起个名字吧…" maxlength="16" autofocus>
  <div class="psk-wrap">
    <input id="psk-input" type="password" placeholder="输入密码" maxlength="32">
    <span class="psk-toggle" onclick="togglePsk()" title="显示/隐藏密码">👁</span>
  </div>
  <button id="join-btn" onclick="doJoin()">进入聊天室</button>
</div>

<!-- 聊天界面 -->
<div id="chat-container">
  <div id="top-bar">
    <span class="room-name">net_chat 大厅</span>
    <span class="status"><span class="dot"></span> 已连接</span>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <button id="emoji-btn" onclick="toggleEmojiPicker()" title="表情">😊</button>
    <input id="msg-input" type="text" placeholder="说点什么……" maxlength="500" autocomplete="off">
    <button id="send-btn" onclick="doSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <!-- 表情选择器 -->
  <div id="emoji-picker">
    <div class="emoji-cats" id="emoji-cats"></div>
    <div class="emoji-grid-wrap">
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
  </div>
</div>

<script>
  let ws = null;
  let myName = '';
  let myMode = 'login'; // 'login' | 'register'
  let emojiPickerOpen = false;
  let currentEmojiCat = 0;

  // ========== 表情数据 ==========
  const emojiCategories = [
    { icon: '😀', name: '笑脸', emojis: [
      '😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇','🥰','😍','🤩',
      '😘','😗','😚','😙','🥲','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','🤐',
      '🤨','😐','😑','😶','😏','😒','🙄','😬','😮‍💨','🤥','😌','😔','😪','🤤','😴','😷',
      '🤒','🤕','🤢','🤮','🥴','😵','😵‍💫','🤯','🥳','🥺','😢','😭','😤','😠','😡','🤬'
    ]},
    { icon: '👍', name: '手势', emojis: [
      '👍','👎','👏','🙌','👐','🤲','🤝','🙏','✌️','🤞','🤟','🤘','🤙','👈','👉','👆',
      '🖕','👇','☝️','💪','🤳','👌','🤌','🤏','✋','🤚','🖐️','🖖','👋','🤙','🦾','🦿'
    ]},
    { icon: '❤️', name: '爱心', emojis: [
      '❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖',
      '💘','💝','💟','♥️','🫶','💌','💋','🫂','💯','🔥','⭐','🌟','✨','💥','💫','💦','💨'
    ]},
    { icon: '🐱', name: '动物', emojis: [
      '🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐻‍❄️','🐨','🐯','🦁','🐮','🐷','🐸','🐵',
      '🙈','🙉','🙊','🐒','🐔','🐧','🐦','🐤','🐣','🐥','🦆','🦅','🦉','🦇','🐺','🐗',
      '🐴','🦄','🐝','🐛','🦋','🐌','🐞','🐜','🪰','🪲','🪳','🦟','🦗','🕷️','🦂','🐢'
    ]},
    { icon: '🍔', name: '食物', emojis: [
      '🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍈','🍒','🍑','🥭','🍍','🥥','🥝',
      '🍅','🍆','🥑','🥦','🥬','🥒','🌶️','🫑','🌽','🥕','🧄','🧅','🥔','🍠','🥐','🍞',
      '🥖','🧀','🥚','🍳','🧈','🥞','🧇','🥓','🥩','🍗','🍖','🦴','🌭','🍔','🍟','🍕'
    ]},
    { icon: '⚽', name: '活动', emojis: [
      '⚽','🏀','🏈','⚾','🥎','🎾','🏐','🏉','🥏','🎱','🪀','🏓','🏸','🏒','🏑','🥍',
      '🏏','⛳','🎣','🤿','🏹','🥊','🥋','🎽','🛹','🛼','🛷','⛸️','🥌','🎿','⛷️','🏂'
    ]},
    { icon: '🎉', name: '庆祝', emojis: [
      '🎉','🎊','🎈','🎂','🎀','🎁','🎃','🎄','🎋','🎍','🎎','🎏','🎐','🎑','🧧','🪅',
      '🎗️','🥇','🥈','🥉','🏆','🎖️','🏅','🎫','🎟️','🎪','🎭','🎨','🎬','🎤','🎧','🎼'
    ]},
    { icon: '💡', name: '物品', emojis: [
      '💡','🔦','📖','📚','📓','📒','📔','📕','📗','📘','📙','✏️','🖊️','🖋️','✒️','📝',
      '💻','🖥️','⌨️','🖱️','🖲️','💽','💾','💿','📀','📱','📲','☎️','📞','📟','📠','📺',
      '🔋','🪫','🔌','⏰','🕰️','⌚','📡','🔭','🔬','🕯️','🪔','💵','💴','💶','💷','💰'
    ]}
  ];

  // ========== 初始化表情选择器（分类标签只渲染一次） ==========
  (function initEmojiPicker() {
    var catsEl = document.getElementById('emoji-cats');
    emojiCategories.forEach(function(cat, i) {
      var btn = document.createElement('button');
      btn.className = 'emoji-cat' + (i === 0 ? ' active' : '');
      btn.textContent = cat.icon;
      btn.title = cat.name;
      btn.dataset.catIndex = i;
      catsEl.appendChild(btn);
    });
    // 事件委托：分类点击只更新网格和激活态，不重建 DOM
    catsEl.addEventListener('click', function(e) {
      var btn = e.target.closest('.emoji-cat');
      if (!btn) return;
      e.stopPropagation();
      currentEmojiCat = parseInt(btn.dataset.catIndex);
      // 更新激活态
      Array.from(catsEl.children).forEach(function(b, idx) {
        b.className = 'emoji-cat' + (idx === currentEmojiCat ? ' active' : '');
      });
      // 只刷新网格
      renderEmojiGrid();
    });
    // 初始渲染网格
    renderEmojiGrid();
  })();

  function renderEmojiGrid() {
    var gridEl = document.getElementById('emoji-grid');
    var cat = emojiCategories[currentEmojiCat];
    gridEl.innerHTML = '';
    cat.emojis.forEach(function(emoji) {
      var item = document.createElement('button');
      item.className = 'emoji-item';
      item.textContent = emoji;
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        insertEmoji(emoji);
      });
      gridEl.appendChild(item);
    });
  }

  function toggleEmojiPicker() {
    var picker = document.getElementById('emoji-picker');
    emojiPickerOpen = !emojiPickerOpen;
    if (emojiPickerOpen) {
      picker.classList.add('show');
    } else {
      picker.classList.remove('show');
    }
  }

  function closeEmojiPicker() {
    emojiPickerOpen = false;
    document.getElementById('emoji-picker').classList.remove('show');
  }

  function insertEmoji(emoji) {
    var inp = document.getElementById('msg-input');
    var start = inp.selectionStart || 0;
    var end   = inp.selectionEnd || 0;
    var before = inp.value.substring(0, start);
    var after  = inp.value.substring(end);
    inp.value = before + emoji + after;
    // 光标移到插入后
    var pos = start + emoji.length;
    inp.setSelectionRange(pos, pos);
    inp.focus();
    closeEmojiPicker();
  }

  // ========== 模式切换 ==========
  function switchMode(mode) {
    myMode = mode;
    document.getElementById('mode-login').classList.toggle('active', mode === 'login');
    document.getElementById('mode-register').classList.toggle('active', mode === 'register');
    document.getElementById('join-btn').textContent = mode === 'login' ? '登录聊天室' : '注册并进入';
    document.getElementById('psk-input').placeholder = mode === 'login' ? '请输入登录密码' : '请设置密码（至少4位）';
  }

  function togglePsk() {
    var inp = document.getElementById('psk-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // ========== 加入 ==========
  function doJoin() {
    const inp = document.getElementById('name-input');
    const pskInp = document.getElementById('psk-input');
    myName = inp.value.trim() || '路人' + Math.floor(Math.random() * 900 + 100);

    // 简单校验：注册时密码至少4位
    var password = pskInp.value.trim();
    if (myMode === 'register' && password.length < 4) {
      addSystemBanner('密码至少需要 4 位', 'leave');
      return;
    }

    inp.disabled = true;
    pskInp.disabled = true;

    // 连接 bridge
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(proto + '://' + location.host);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        type: 'join',
        name: myName,
        psk: password,
        register: myMode === 'register'
      }));
    };

    ws.onmessage = (e) => onMessage(e.data);

    ws.onclose = () => {
      addSystem('连接已断开', 'leave');
      ws = null;
    };

    ws.onerror = () => {
      addSystem('无法连接到服务器，请确认 bridge.js 已启动', 'leave');
    };

    // 切到聊天界面
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('chat-container').classList.add('active');
    document.getElementById('msg-input').focus();

    addSystem('正在连接聊天室……', 'join');
  }

  // ========== 单条系统消息（登录面板） ==========
  function addSystemBanner(text, cls) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'sys-msg ' + (cls || '');
    div.textContent = text;
    box.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }

  // ========== 接收消息 ==========
  function onMessage(raw) {
    try {
      const obj = JSON.parse(raw);

      if (obj.type === 'msg') {
        // 聊天消息
        addMessage(obj.from === 'me' ? 'self' : 'other', obj.name || obj.from || '', obj.text);
      } else if (obj.type === 'joined') {
        // 成功加入聊天室
        addSystem('✓ ' + obj.text, 'join');
      } else if (obj.type === 'system') {
        // 系统通知
        addSystem(obj.text, 'join');
      } else if (obj.type === 'error') {
        // 错误
        addSystem('✗ ' + obj.text, 'leave');
      } else {
        addSystem(obj.text || raw, '');
      }
    } catch (e) {
      // 非 JSON 消息 → 当系统消息显示
      addSystem(raw, 'join');
    }
  }

  // ========== 发送 ==========
  function doSend() {
    const inp = document.getElementById('msg-input');
    const text = inp.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({ type: 'msg', text: text }));
    inp.value = '';
    inp.focus();
  }

  // ========== 渲染 ==========
  function addMessage(type, name, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + type;

    // 检测是否为纯表情消息（仅包含 emoji 和空格）
    var isEmojiOnly = /^[\s\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{200D}\u{FE0F}\u{20E3}\u{200D}\u{2640}\u{2642}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}]+$/u.test(text);
    if (isEmojiOnly) div.classList.add('emoji-only');

    const sender = document.createElement('span');
    sender.className = 'sender';
    sender.textContent = name || '';

    const bubble = document.createElement('span');
    bubble.className = 'bubble';
    bubble.textContent = text;

    div.appendChild(sender);
    div.appendChild(bubble);
    appendAndScroll(div);
  }

  function addSystem(text, cls) {
    const div = document.createElement('div');
    div.className = 'sys-msg ' + (cls || '');
    div.textContent = text;
    appendAndScroll(div);
  }

  function appendAndScroll(el) {
    const box = document.getElementById('messages');
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  }

  // ========== 快捷键 ==========
  document.addEventListener('keydown', (e) => {
    // 登录面板回车 → 加入
    if (e.key === 'Enter' && document.getElementById('login-panel').style.display !== 'none') {
      const inp = document.getElementById('name-input');
      if (document.activeElement === inp) doJoin();
    }
    // 聊天界面回车 → 发送
    if (e.key === 'Enter' && document.getElementById('chat-container').classList.contains('active')) {
      if (document.activeElement === document.getElementById('msg-input')) doSend();
    }
    // Esc 关闭表情选择器
    if (e.key === 'Escape' && emojiPickerOpen) {
      closeEmojiPicker();
    }
  });

  // 点击外部关闭表情选择器
  document.addEventListener('click', function(e) {
    if (!emojiPickerOpen) return;
    var picker = document.getElementById('emoji-picker');
    var btn = document.getElementById('emoji-btn');
    if (!picker.contains(e.target) && e.target !== btn) {
      closeEmojiPicker();
    }
  });
</script>
</body>
</html>
